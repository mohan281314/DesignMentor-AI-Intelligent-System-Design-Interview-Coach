version: "3.9"

# ============================================================
# DesignMentor AI — Production Docker Compose
# ============================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     ${DB_USER:-designmentor}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME:-designmentor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-designmentor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No exposed ports in prod — only internal network access

  # ──────────────────────────────────────────────────────────
  # Redis 7
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # FastAPI Backend (Gunicorn + Uvicorn)
  # ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    env_file: .env.production
    environment:
      ENVIRONMENT:    production
      DATABASE_URL:   postgresql+psycopg2://${DB_USER:-designmentor}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-designmentor}
      REDIS_URL:      redis://:${REDIS_PASSWORD:-}@redis:6379/0
      PORT:           8000
      WEB_CONCURRENCY: 4
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ──────────────────────────────────────────────────────────
  # Next.js Frontend
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.designmentor.ai}
    restart: always
    environment:
      NODE_ENV:            production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.designmentor.ai}
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────────────────
  # Nginx reverse proxy (HTTPS termination + routing)
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
